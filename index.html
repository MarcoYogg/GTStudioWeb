<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Studio 內部管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-hidden">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>載入中...</p>
    </div>

    <!-- Toast 通知容器 -->
    <div id="toast-container"></div>

    <header>
        <div class="header-container">
            <h1>GT Studio</h1>
            <nav id="top-nav">
                <button class="nav-btn active" data-section="home">首頁</button>
                <button class="nav-btn" data-section="upload">上傳收據</button>
                <button class="nav-btn" data-section="list">收據清單</button>
                <button class="nav-btn" data-section="floorplan">平面圖</button>
                <button class="nav-btn" data-section="schedule">Schedule</button>
                <button class="nav-btn" data-section="admin">權限管理</button>
            </nav>
            <div id="auth-section">
                <span id="user-email"></span>
                <button id="login-btn" class="auth-btn">Google 登入</button>
                <button id="logout-btn" class="auth-btn" style="display: none;">登出</button>
            </div>
        </div>
    </header>

    <main id="app-content">
        <!-- 首頁 -->
        <section id="section-home" class="page-section">
            <h2>歡迎回來</h2>
            <p>這是 GT Studio 的內部管理系統。請登入後開始使用功能。</p>
            <div id="login-welcome" style="display: none;">
                <p>您已成功登入，可以使用上方導覽列查看或上傳收據。</p>
            </div>
        </section>

        <!-- 上傳收據 -->
        <section id="section-upload" class="page-section" style="display: none;">
            <h2>上傳新收據</h2>
            <form id="upload-form">
                <div class="form-group">
                    <label for="receipt-title">標題</label>
                    <input type="text" id="receipt-title" required placeholder="例如：4月電費">
                </div>
                <div class="form-group">
                    <label for="receipt-amount">金額</label>
                    <input type="number" id="receipt-amount" required placeholder="請輸入金額">
                </div>
                <div class="form-group">
                    <label for="receipt-note">備註</label>
                    <textarea id="receipt-note" rows="3" placeholder="其他說明..."></textarea>
                </div>
                <div class="form-group">
                    <label for="receipt-file">檔案 (JPG/PNG/PDF)</label>
                    <input type="file" id="receipt-file" accept="image/*,.pdf" required>
                </div>
                <button type="submit" id="submit-upload" class="primary-btn">開始上傳</button>
            </form>
            <div id="upload-status"></div>
        </section>

        <!-- 收據清單 -->
        <section id="section-list" class="page-section" style="display: none;">
            <h2>收據歷史記錄</h2>
            <div class="table-container">
                <table id="receipts-table">
                    <thead>
                        <tr>
                            <th>標題</th>
                            <th>金額</th>
                            <th>上傳者</th>
                            <th>狀態</th>
                            <th>日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="receipts-body">
                        <!-- 資料將由 JS 動態生成 -->
                    </tbody>
                </table>
            </div>

            <!-- 收據詳情 Modal -->
            <div id="receipt-modal" class="modal" style="display: none;">
                <div class="modal-content receipt-detail-content">
                    <h3>收據詳情</h3>
                    <div id="receipt-detail-body">
                        <!-- 由 JS 動態生成內容 -->
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="cancel-btn" id="close-receipt-modal">關閉</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 平面圖 -->
        <section id="section-floorplan" class="page-section" style="display: none;">
            <h2>工作室平面圖</h2>
            <div class="floorplan-container">
                <img id="floorplan-img" src="floorplan-placeholder.jpeg" alt="工作室平面圖" style="max-width: 100%;">
                <p class="hint">如需更新平面圖，請聯繫管理員。</p>
            </div>
        </section>
        <!-- Schedule / 出席日曆 -->
        <section id="section-schedule" class="page-section" style="display: none;">
            <div class="schedule-header">
                <h2>出席日曆</h2>
                <div class="calendar-nav">
                    <button id="cal-prev" class="cal-nav-btn">‹</button>
                    <span id="cal-month-label"></span>
                    <button id="cal-next" class="cal-nav-btn">›</button>
                </div>
                <button id="create-event-btn" class="primary-btn">+ 新增活動</button>
            </div>
            <div id="calendar-grid"></div>

            <!-- 日詳情 Modal -->
            <div id="day-modal" class="modal" style="display: none;">
                <div class="modal-content day-modal-content">
                    <h3 id="day-modal-title"></h3>
                    <div id="day-modal-body"></div>
                    <div class="modal-footer">
                        <button type="button" class="cancel-btn" id="close-day-modal">關閉</button>
                    </div>
                </div>
            </div>

            <!-- 新增活動 Modal -->
            <div id="event-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h3>新增活動</h3>
                    <form id="event-form">
                        <div class="form-group">
                            <label>標題</label>
                            <input type="text" id="ev-title" required placeholder="活動名稱">
                        </div>
                        <div class="form-group">
                            <label>日期</label>
                            <input type="date" id="ev-date" required>
                        </div>
                        <div class="form-group">
                            <label>開始時間</label>
                            <input type="time" id="ev-time-start">
                        </div>
                        <div class="form-group">
                            <label>結束時間</label>
                            <input type="time" id="ev-time-end">
                        </div>
                        <div class="form-group">
                            <label>地點</label>
                            <input type="text" id="ev-location" placeholder="GT Studio / 其他">
                        </div>
                        <div class="form-group">
                            <label>描述</label>
                            <textarea id="ev-desc" rows="2" placeholder="活動說明..."></textarea>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="cancel-btn" id="close-event-modal">取消</button>
                            <button type="submit" class="primary-btn">建立活動</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <!-- Admin Panel (管理員專區) -->
        <section id="section-admin" class="page-section" style="display: none;">
            <h2>成員權限管理</h2>
            
            <!-- 操作與篩選列 -->
            <div class="admin-actions">
                <button id="add-member-btn" class="primary-btn">+ 新增成員</button>
                <div class="search-filter">
                    <input type="text" id="member-search" placeholder="搜尋名稱或 Email...">
                    <select id="role-filter">
                        <option value="all">所有職位</option>
                        <option value="developer">Developer</option>
                        <option value="finance">Finance</option>
                        <option value="member">Member</option>
                        <option value="guest">Guest</option>
                    </select>
                </div>
            </div>

            <!-- 成員表格 -->
            <div class="table-container">
                <table id="members-table">
                    <thead>
                        <tr>
                            <th>名稱</th>
                            <th>Email</th>
                            <th>職位</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="members-body">
                        <!-- 由 JS 動態生成 -->
                    </tbody>
                </table>
            </div>

            <!-- 新增/編輯成員的 Modal -->
            <div id="member-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h3 id="modal-title">新增成員</h3>
                    <form id="member-form">
                        <input type="hidden" id="edit-mode" value="false">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="m-email" required placeholder="例如：user@gmail.com">
                        </div>
                        <div class="form-group">
                            <label>名稱</label>
                            <input type="text" id="m-name" required placeholder="使用者顯示名稱">
                        </div>
                        <div class="form-group">
                            <label>職位</label>
                            <select id="m-role">
                                <option value="guest">Guest</option>
                                <option value="member">Member</option>
                                <option value="finance">Finance</option>
                                <option value="developer">Developer</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>狀態</label>
                            <select id="m-status">
                                <option value="active">使用中 (Active)</option>
                                <option value="inactive">已停用 (Inactive)</option>
                            </select>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="cancel-btn" id="close-modal">取消</button>
                            <button type="submit" class="primary-btn">儲存</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>    </main>

    <!-- 這裡使用 type="module" 是為了支援 Firebase 模組化導入 -->
    <script type="module" src="app.js"></script>
</body>
</html>

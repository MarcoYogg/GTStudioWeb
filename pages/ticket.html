        <!-- Tickets -->
        <section id="section-tickets" class="page-section">
            <div class="tickets-layout">

                <!-- 左側：提交表單 -->
                <div class="ticket-form-panel">
                    <h3>提交新 Ticket</h3>
                    <form id="ticket-form">
                        <div class="form-group">
                            <label>類型</label>
                            <select id="tk-type">
                                <option value="bug">🐛 Bug 回報</option>
                                <option value="feature">✨ 功能建議</option>
                                <option value="improvement">🔧 改善建議</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>標題</label>
                            <input type="text" id="tk-title" required placeholder="簡短說明問題">
                        </div>
                        <div class="form-group">
                            <label>詳細說明</label>
                            <textarea id="tk-desc" rows="4" required placeholder="請描述問題 / 建議的內容、它發生的地方、及您希望如何處理..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>優先級</label>
                            <select id="tk-priority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>附件相片 (可選)</label>
                            <input type="file" id="tk-photo" accept="image/*">
                        </div>
                        <button type="submit" id="tk-submit" class="primary-btn" style="width:100%;">提交 Ticket</button>
                    </form>
                    <div id="tk-login-hint" style="display:none; color:#999; margin-top:10px;">🔒 請登入後才能提交</div>
                </div>

                <!-- 右側：清單 -->
                <div class="ticket-list-panel">
                    <div class="ticket-list-header">
                        <h3>Ticket 清單</h3>
                        <div class="ticket-filters">
                            <button class="tk-filter-btn active" data-filter="all">全部</button>
                            <button class="tk-filter-btn" data-filter="open">Open</button>
                            <button class="tk-filter-btn" data-filter="in_progress">In Progress</button>
                            <button class="tk-filter-btn" data-filter="resolved">Resolved</button>
                        </div>
                    </div>
                    <div id="tickets-list">
                        <p style="color:#aaa;">載入中...</p>
                    </div>
                </div>

            </div>
        </section>

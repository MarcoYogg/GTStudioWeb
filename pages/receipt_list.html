        <!-- 收據清單 -->
        <section id="section-list" class="page-section">
            <h2>收據歷史記錄</h2>
            
            <!-- 月度報表 (每月結算) -->
            <div class="report-container">
                <div class="report-card">
                    <h3>📊 月度報表結算</h3>
                    <div class="report-form">
                        <div class="form-row">
                            <label>選擇月份：</label>
                            <input type="month" id="report-month-select">
                        </div>
                        <div class="form-row">
                            <label>水電費：</label>
                            <input type="number" id="report-utilities" placeholder="輸入金額..." value="0">
                        </div>
                        <div class="form-row" style="display: none;">
                            <label>固定租金：</label>
                            <input type="number" id="report-rent" value="10000" readonly>
                        </div>
                        <button id="generate-report-btn" class="primary-btn">產生報表</button>
                    </div>
                </div>

                <div id="report-results" class="report-results" style="display: none;">
                    <hr>
                    <div class="result-grid">
                        <div class="result-item">
                            <span class="label">總收據額 (Approved)：</span>
                            <span id="res-total-approved" class="value">$0</span>
                        </div>
                        <div class="result-item" style="display: none;">
                            <span class="label">水電 + 租金：</span>
                            <span id="res-total-fixed" class="value">$0</span>
                        </div>
                        <div class="result-item highlight">
                            <span class="label">總預算支付：</span>
                            <span id="res-total-sum" class="value">$0</span>
                        </div>
                        <div class="result-item split">
                            <span class="label">每人應付 (8人計)：</span>
                            <span id="res-per-person" class="value per-person">$0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table id="receipts-table">
                    <thead>
                        <tr>
                            <th>標題</th>
                            <th>金額</th>
                            <th>上傳者</th>
                            <th>狀態</th>
                            <th>日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="receipts-body">
                        <!-- 資料將由 JS 動態生成 -->
                    </tbody>
                </table>
            </div>

            <!-- 收據詳情 Modal -->
            <div id="receipt-modal" class="modal" style="display: none;">
                <div class="modal-content receipt-detail-content">
                    <h3>收據詳情</h3>
                    <div id="receipt-detail-body">
                        <!-- 由 JS 動態生成內容 -->
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="cancel-btn" id="close-receipt-modal">關閉</button>
                    </div>
                </div>
            </div>
        </section>
